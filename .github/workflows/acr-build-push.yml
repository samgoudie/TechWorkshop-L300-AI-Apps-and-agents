name: Build and push to ACR

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env for Docker build
        shell: bash
        run: |
          umask 077
          printf "%s" "${{ secrets.ENV }}" > src/.env

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/techworkshop-l300-ai-apps:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/techworkshop-l300-ai-apps:${{ github.sha }}

      - name: Cleanup .env
        if: always()
        run: rm -f src/.env
